apiVersion: apps/v1
kind: Deployment
metadata:
  name: bin-checker-service
  namespace: bin-checker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bin-checker-service
  template:
    metadata:
      labels:
        app: bin-checker-service
    spec:
      serviceAccountName: bin-checker-service-sa
      containers:
        - name: bin-checker-service
          image: local/apps/bin-checker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
