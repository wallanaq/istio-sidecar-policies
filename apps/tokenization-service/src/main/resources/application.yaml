spring:
  application:
    name: tokenization-service
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

clients:
  bin-checker:
    url: http://bin-checker-service:8080
    connect-timeout: 2000
    read-timeout: 5000
