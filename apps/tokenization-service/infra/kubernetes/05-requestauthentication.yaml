apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: tokenization-service-jwt
  namespace: tokenization-service
spec:
  selector:
    matchLabels:
      app: tokenization-service
  jwtRules:
    - issuer: "http://keycloak.k8s.orb.local/realms/master"
      jwksUri: "http://keycloak-svc.keycloak.svc.cluster.local/realms/master/protocol/openid-connect/certs"
      forwardOriginalToken: true
